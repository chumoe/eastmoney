services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eastmoney-app
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./:/app
    environment:
      - TZ=Asia/Shanghai
      - DB_FILE_PATH=/app/data/funds.db
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

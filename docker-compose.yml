services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eastmoney:latest
    container_name: eastmoney-app
    restart: unless-stopped
    network_mode: host
    volumes:
      # 代码目录 — 宿主机修改即时生效
      - ./app:/app/app
      - ./src:/app/src
      - ./config:/app/config
      - ./main.py:/app/main.py
      # 持久数据
      - ./data:/app/data
      - ./reports:/app/reports
      - ./.env:/app/.env
      # static/ 保留使用镜像内的前端构建产物
    environment:
      - TZ=Asia/Shanghai
      - DB_FILE_PATH=/app/data/funds.db
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
